name: Terraform Docs

on:
  pull_request:
    branches:
      - main
    paths:
      - "main.tf"
      - "variables.tf"
      - "outputs.tf"
      - "modules/**"
      - "docs/**"
      - ".github/workflows/terraform-docs.yml"

jobs:
  docs:
    name: Validate Terraform Docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate root module docs
        uses: terraform-docs/gh-actions@v1.4.1
        with:
          working-dir: .
          output-file: docs/root-module.md
          output-method: inject
          git-push: "false"
          fail-on-diff: "true"
